<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FinTrack Pro - Spreadsheet Cloud ERP</title>
    <!-- Google Fonts & Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           1. CORE VARIABLES & DESIGN TOKENS (MATERIAL 3)
           ========================================== */
        :root {
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --sb-width: 260px;
            --sb-collapsed-width: 80px;
            --header-height: 70px;
            --bnav-height: 70px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Light Varian Tokens */
            --bg-primary: #f6f8fa;
            --bg-surface: rgba(255, 255, 255, 0.85);
            --bg-surface-srgb: #ffffff;
            --bg-sidebar: rgba(255, 255, 255, 0.9);
            --border-color: rgba(224, 227, 231, 0.6);
            --text-primary: #1a1d20;
            --text-secondary: #5a636a;
            --text-muted: #8a949f;
            
            --primary: #6750a4;
            --on-primary: #ffffff;
            --primary-container: #eaddff;
            --secondary: #625b71;
            --success: #13854e;
            --success-container: #d1e7dd;
            --danger: #b3261e;
            --danger-container: #f9dedc;
            --warning: #bf6a02;
            --warning-container: #ffecb5;
            --info: #0077c2;
            --info-container: #cce5ff;
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 8px 16px rgba(0,0,0,0.04);
            --shadow-lg: 0 16px 32px rgba(0,0,0,0.08);
            --glass-blur: blur(12px);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-pill: 9999px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f1115;
            --bg-surface: rgba(26, 29, 34, 0.8);
            --bg-surface-srgb: #1a1d22;
            --bg-sidebar: rgba(20, 22, 26, 0.9);
            --border-color: rgba(45, 50, 58, 0.5);
            --text-primary: #f0f2f5;
            --text-secondary: #a0aec0;
            --text-muted: #64748b;
            
            --primary: #d0bcff;
            --on-primary: #381e72;
            --primary-container: #4f378b;
            --secondary: #ccc2dc;
            --success: #34d399;
            --success-container: #064e3b;
            --danger: #f2b8b5;
            --danger-container: #8c1d18;
            --warning: #fbbf24;
            --warning-container: #78350f;
            --info: #38bdf8;
            --info-container: #0c4a6e;
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 16px rgba(0,0,0,0.4);
            --shadow-lg: 0 16px 32px rgba(0,0,0,0.6);
        }

        /* ==========================================
           2. GLOBAL RESETS & SYSTEM LAYOUT
           ========================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; transition: background-color 0.3s ease, color 0.3s ease; display: flex; min-height: 100vh; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-pill); }
        
        .d-flex { display: flex; }
        .align-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .w-100 { width: 100%; }
        .gap-1 { gap: 8px; }
        .gap-2 { gap: 16px; }
        .text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Ripple Component */
        .ripple-effect { position: relative; overflow: hidden; }
        .ripple { position: absolute; background: rgba(255, 255, 255, 0.4); border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s linear; pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* App Main Shell Wrapper Grid */
        .app-container {
            display: grid;
            grid-template-areas: "sidebar header" "sidebar content" "sidebar footer";
            grid-template-columns: var(--sb-width) 1fr;
            grid-template-rows: var(--header-height) 1fr auto;
            width: 100%; min-height: 100vh; transition: var(--transition-smooth);
        }
        .app-container.sidebar-collapsed { grid-template-columns: var(--sb-collapsed-width) 1fr; }

        /* ==========================================
           3. SIDEBAR NAVIGATION SYSTEM (DESKTOP)
           ========================================== */
        .app-sidebar {
            grid-area: sidebar; background: var(--bg-sidebar); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0;
            width: var(--sb-width); z-index: 100; transition: var(--transition-smooth); overflow-y: auto; overflow-x: hidden;
        }
        .sidebar-collapsed .app-sidebar { width: var(--sb-collapsed-width); }
        .sidebar-brand { height: var(--header-height); display: flex; align-items: center; padding: 0 24px; gap: 12px; border-bottom: 1px solid var(--border-color); }
        .sidebar-brand .logo-icon { color: var(--primary); font-size: 32px; }
        .sidebar-brand span { font-weight: 800; font-size: 18px; color: var(--primary); transition: var(--transition-smooth); }
        .sidebar-collapsed .sidebar-brand span { opacity: 0; pointer-events: none; width: 0; }

        .sidebar-profile { padding: 20px 16px; margin: 12px; background: rgba(103, 80, 164, 0.05); border-radius: var(--radius-md); display: flex; align-items: center; gap: 12px; transition: var(--transition-smooth); }
        .sidebar-collapsed .sidebar-profile { padding: 10px 4px; margin: 8px; justify-content: center; }
        .profile-avatar { width: 44px; height: 44px; border-radius: var(--radius-pill); object-fit: cover; border: 2px solid var(--primary); }
        .profile-info { display: flex; flex-direction: column; overflow: hidden; transition: var(--transition-smooth); }
        .sidebar-collapsed .profile-info { display: none; }
        .profile-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .profile-role { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        .sidebar-menu { list-style: none; padding: 0 12px; display: flex; flex-direction: column; gap: 4px; }
        .sidebar-menu-item a { display: flex; align-items: center; padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-secondary); text-decoration: none; gap: 16px; font-weight: 500; font-size: 14px; transition: var(--transition-smooth); cursor: pointer; }
        .sidebar-menu-item a:hover { background: rgba(0,0,0,0.03); color: var(--text-primary); }
        .sidebar-menu-item.active a { background: var(--primary-container); color: var(--primary); font-weight: 600; }
        .sidebar-menu-item a .icon-menu { font-size: 24px; }
        .sidebar-collapsed .sidebar-menu-item a { justify-content: center; padding: 12px 0; }
        .sidebar-collapsed .sidebar-menu-item a span:not(.icon-menu) { display: none; }
        .sidebar-toggle-btn { margin-top: auto; padding: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-top: 1px solid var(--border-color); color: var(--text-secondary); }

        /* ==========================================
           4. TOP HEADER NAVIGATION BAR
           ========================================== */
        .app-header {
            grid-area: header; background: var(--bg-surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color); position: fixed; top: 0; right: 0; left: var(--sb-width);
            height: var(--header-height); z-index: 99; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; transition: var(--transition-smooth);
        }
        .sidebar-collapsed .app-header { left: var(--sb-collapsed-width); }
        .header-left { display: flex; align-items: center; gap: 16px; flex: 1; max-width: 500px; }
        .search-wrapper { position: relative; width: 100%; }
        .search-wrapper input { width: 100%; padding: 10px 16px 10px 44px; border-radius: var(--radius-pill); border: 1px solid var(--border-color); background: rgba(0,0,0,0.02); color: var(--text-primary); outline: none; font-size: 14px; transition: var(--transition-smooth); }
        .search-wrapper input:focus { border-color: var(--primary); background: var(--bg-surface-srgb); box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.2); }
        .search-wrapper .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 20px; }

        .header-center-datetime { display: flex; flex-direction: column; align-items: flex-end; margin-right: 16px; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .header-center-datetime .time-realtime { font-weight: 700; color: var(--primary); font-size: 14px; }
        .header-right { display: flex; align-items: center; gap: 8px; }

        .icon-btn { width: 40px; height: 40px; border-radius: var(--radius-pill); border: none; background: transparent; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: var(--transition-smooth); }
        .icon-btn:hover { background: rgba(0,0,0,0.04); color: var(--text-primary); }
        
        .user-dropdown-wrapper { position: relative; }
        .header-avatar-trigger { cursor: pointer; border: 2px solid transparent; border-radius: var(--radius-pill); transition: var(--transition-smooth); }
        .header-avatar-trigger:hover { border-color: var(--primary); }

        .dropdown-menu { position: absolute; top: 50px; right: 0; background: var(--bg-surface-srgb); border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); width: 220px; display: none; flex-direction: column; overflow: hidden; z-index: 200; animation: fadeIn 0.2s ease; }
        .dropdown-menu.show { display: flex; }
        .dropdown-header { padding: 16px; border-bottom: 1px solid var(--border-color); font-size: 13px; color: var(--text-muted); }
        .dropdown-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; color: var(--text-primary); text-decoration: none; font-size: 14px; cursor: pointer; transition: var(--transition-smooth); }
        .dropdown-item:hover { background: rgba(0,0,0,0.02); color: var(--primary); }

        /* Mobile Bottom Nav Bar Shell */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bnav-height); background: var(--bg-sidebar); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border-color); box-shadow: 0 -4px 16px rgba(0,0,0,0.05); z-index: 100; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom, 0px); }
        .bnav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-decoration: none; font-size: 11px; font-weight: 500; width: 60px; height: 100%; cursor: pointer; transition: var(--transition-smooth); }
        .bnav-icon-wrapper { padding: 4px 16px; border-radius: var(--radius-pill); transition: var(--transition-smooth); margin-bottom: 2px; }
        .bnav-item.active .bnav-icon-wrapper { background: var(--primary-container); color: var(--primary); }
        .bnav-item.active { color: var(--primary); font-weight: 700; }

        /* ==========================================
           5. CONTENT & COMPONENT UI SYSTEM DESIGN
           ========================================== */
        .app-content { grid-area: content; padding: calc(var(--header-height) + 24px) 24px 24px 24px; min-height: calc(100vh - var(--header-height) - 60px); transition: var(--transition-smooth); }
        
        .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500; }
        .breadcrumb a { color: var(--primary); text-decoration: none; cursor: pointer; }
        .breadcrumb span.sep { color: var(--text-muted); }

        .card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: 24px; transition: var(--transition-smooth); position: relative; overflow: hidden; }
        .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .card-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

        .welcome-card { background: linear-gradient(135deg, var(--primary), #4f378b); color: white; border: none; }
        .welcome-card .card-title { color: white; }
        .welcome-card p { color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.5; }

        .grid-dash-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .grid-two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }

        .stat-val { font-size: 28px; font-weight: 800; margin: 8px 0; letter-spacing: -0.5px; }
        .badge { padding: 4px 8px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; }
        .badge-success { background: var(--success-container); color: var(--success); }
        .badge-danger { background: var(--danger-container); color: var(--danger); }

        /* Button Architecture System Varian Components */
        .btn { padding: 10px 20px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition-smooth); outline: none; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: var(--on-primary); }
        .btn-primary:hover { background: #533c90; }
        .btn-outline { background: transparent; border-color: var(--border-color); color: var(--text-primary); }
        .btn-disabled { background: var(--border-color) !important; color: var(--text-muted) !important; cursor: not-allowed; }

        /* Floating Controls Form UI Elements */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-control { width: 100%; padding: 14px 16px; border: 1px solid var(--border-color); background: var(--bg-surface-srgb); color: var(--text-primary); border-radius: var(--radius-md); outline: none; font-size: 14px; transition: var(--transition-smooth); }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.15); }
        
        .form-select { width: 100%; padding: 14px 16px; border: 1px solid var(--border-color); background: var(--bg-surface-srgb); color: var(--text-primary); border-radius: var(--radius-md); outline: none; font-size: 14px; appearance: none; }
        .form-group-select-wrapper { position: relative; }
        .form-group-select-wrapper::after { content: 'expand_more'; font-family: 'Material Symbols Rounded'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }

        /* Grid Data Tables Elements */
        .table-responsive-container { width: 100%; overflow-x: auto; margin-top: 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .modern-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; background: var(--bg-surface-srgb); }
        .modern-table th { background: rgba(0,0,0,0.01); padding: 16px; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border-color); cursor: pointer; }
        .modern-table td { padding: 16px; border-bottom: 1px solid var(--border-color); color: var(--text-primary); }
        .modern-table tr:hover td { background: rgba(103, 80, 164, 0.02); }

        .pagination-container { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
        .pagination-buttons { display: flex; gap: 8px; }

        /* Modal Overlay Window Component Layout */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); z-index: 999; display: none; align-items: center; justify-content: center; padding: 16px; animation: fadeIn 0.3s ease; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--bg-surface-srgb); border: 1px solid var(--border-color); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; overflow: hidden; animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        .modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px; background: rgba(0,0,0,0.01); }

        /* Toast Container Framework Elements */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; max-width: 350px; width: 100%; }
        .toast { background: var(--bg-surface-srgb); border-left: 4px solid var(--primary); box-shadow: var(--shadow-lg); border-radius: var(--radius-sm); padding: 16px; display: flex; gap: 12px; position: relative; overflow: hidden; animation: slideInRight 0.3s cubic-bezier(0, 0, 0.2, 1); }
        .toast-success { border-left-color: var(--success); }
        .toast-danger { border-left-color: var(--danger); }
        .toast-body { flex: 1; font-size: 13px; }

        /* Global Application System Footer Component */
        .app-footer { grid-area: footer; background: var(--bg-surface); backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border-color); padding: 16px 24px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; justify-content: space-between; transition: var(--transition-smooth); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 4px; }
        
        .fab { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: white; box-shadow: var(--shadow-lg); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 90; border: none; transition: var(--transition-smooth); }
        .fab:hover { transform: scale(1.1); }

        /* Global Dynamic CSS Keyframes Loader Layers */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Tablet Layout Override Rules */
        @media (max-width: 992px) {
            .app-container { grid-template-columns: var(--sb-collapsed-width) 1fr; }
            .app-sidebar { width: var(--sb-collapsed-width); }
            .sidebar-brand span, .profile-info { display: none; }
            .sidebar-profile { padding: 10px 4px; margin: 8px; justify-content: center; }
            .sidebar-menu-item a { justify-content: center; padding: 12px 0; }
            .sidebar-menu-item a span:not(.icon-menu) { display: none; }
            .app-header { left: var(--sb-collapsed-width); }
        }

        /* Phone Responsive Engine Transform Architecture Rules */
        @media (max-width: 768px) {
            .app-container { grid-template-areas: "header" "content" "footer"; grid-template-columns: 1fr; grid-template-rows: var(--header-height) 1fr auto; }
            .app-sidebar { display: none; }
            .app-header { left: 0 !important; padding: 0 16px; }
            .header-left .search-wrapper, .header-center-datetime { display: none; }
            .bottom-nav { display: flex; }
            .app-content { padding: calc(var(--header-height) + 16px) 16px calc(var(--bnav-height) + 24px) 16px; }
            .grid-two-col { grid-template-columns: 1fr; }
            .app-footer { flex-direction: column; gap: 8px; text-align: center; padding-bottom: calc(var(--bnav-height) + 16px); }
            .fab { bottom: calc(var(--bnav-height) + 16px); right: 16px; }
            
            /* Table Grid Cards Converter Layer CSS */
            .modern-table, .modern-table thead, .modern-table tbody, .modern-table th, .modern-table td, .modern-table tr { display: block; }
            .modern-table thead { display: none; }
            .modern-table tr { background: var(--bg-surface-srgb); border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 12px; padding: 12px; box-shadow: var(--shadow-sm); }
            .modern-table td { text-align: right; padding: 8px 4px; border-bottom: 1px dashed var(--border-color); position: relative; display: flex; justify-content: space-between; }
            .modern-table td:last-child { border-bottom: none; }
            .modern-table td::before { content: attr(data-label); float: left; font-weight: 600; color: var(--text-secondary); }
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <!-- SIDEBAR CONTAINER DESKTOP -->
        <aside class="app-sidebar">
            <div class="sidebar-brand">
                <span class="material-symbols-rounded logo-icon">table_chart</span>
                <span>FinTrack GAS</span>
            </div>
            <div class="sidebar-profile">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar" class="profile-avatar">
                <div class="profile-info">
                    <span class="profile-name" id="sidebarUserName">Loading User...</span>
                    <span class="profile-role">Spreadsheet DB</span>
                </div>
            </div>
            <ul class="sidebar-menu" id="sidebarMenuContainer"></ul>
            <div class="sidebar-toggle-btn ripple-effect" id="sidebarToggleBtn">
                <span class="material-symbols-rounded">menu_open</span>
            </div>
        </aside>

        <!-- TOP APPLICATION HEADER BAR -->
        <header class="app-header">
            <div class="header-left">
                <div class="search-wrapper">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="globalSearchInput" placeholder="Cari mutasi transaksi spreadsheet...">
                </div>
            </div>
            <div class="header-right">
                <div class="header-center-datetime">
                    <span id="txtDayDate">...</span>
                    <span class="time-realtime" id="txtTimeClock">00:00:00 WIB</span>
                </div>
                <button class="icon-btn ripple-effect" id="btnRefresh" title="Sinkronkan Spreadsheet"><span class="material-symbols-rounded">sync</span></button>
                <button class="icon-btn ripple-effect" id="btnThemeToggle" title="Ganti Tema"><span class="material-symbols-rounded">dark_mode</span></button>
                <div class="user-dropdown-wrapper">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar User" class="profile-avatar header-avatar-trigger" id="headerAvatarTrigger">
                    <div class="dropdown-menu" id="userDropdownMenu">
                        <div class="dropdown-header"><strong id="ddMenuName">Loading...</strong></div>
                        <a class="dropdown-item" onclick="App.Router.navigate('profil')"><span class="material-symbols-rounded">person</span>Profil Saya</a>
                        <a class="dropdown-item" style="color:var(--danger)" id="btnLinkLogout"><span class="material-symbols-rounded">logout</span>Selesai</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- DYNAMIC APP VIEWPORT LAYER -->
        <main class="app-content" id="appMainViewport"></main>

        <!-- SYSTEM CONTROLLER FOOTER FRAME -->
        <footer class="app-footer">
            <div>&copy; <span id="footerYear">2026</span> <strong>FinTrack GAS Engine</strong>. All Rights Reserved.</div>
            <div class="d-flex gap-2">
                <span>v3.0.0-Spreadsheet</span>
                <div><div class="status-dot"></div><span>Connected</span></div>
            </div>
        </footer>

        <!-- NAVIGATION MOBILE AT BOTTOM OF MONITOR -->
        <nav class="bottom-nav" id="bottomNavContainer"></nav>
    </div>

    <button class="fab ripple-effect" id="globalFab"><span class="material-symbols-rounded" style="font-size:32px;">add</span></button>
    <div class="toast-container" id="toastContainer"></div>

    <!-- MAIN DIALOG POPUP MODAL WRAPPER -->
    <div class="modal-overlay" id="globalModalOverlay">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle">Form Mutasi</h3><button class="icon-btn ripple-effect" id="modalCloseXBtn"><span class="material-symbols-rounded">close</span></button></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer"><button class="btn btn-outline" id="modalBtnCancel">Batal</button><button class="btn btn-primary" id="modalBtnConfirm">Simpan Ke Sheet</button></div>
        </div>
    </div>

    <!-- ==========================================
       JAVASCRIPT ARCHITECTURE CORE LOGIC
       ========================================== -->
    <script>
        /**
         * FinTrack GAS Master Engine Configuration Object
         * Menggunakan native Apps Script Google RPC `google.script.run` untuk mutasi serverless.
         */
        const App = {
            State: {
                user: { name: "Loading...", email: "..." },
                menus: [
                    { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
                    { id: 'transaksi', label: 'Mutasi Transaksi', icon: 'swap_horiz' },
                    { id: 'keuangan', label: 'Pos Kas & Bank', icon: 'account_balance' },
                    { id: 'profil', label: 'Profil Google', icon: 'person' }
                ],
                transactions: [],
                activeMenu: 'dashboard',
                tableFilter: '',
                tablePage: 1,
                tablePageSize: 4
            },

            init() {
                App.Theme.init();
                App.Clock.start();
                App.Navigation.renderMenus();
                App.Events.bindGlobal();
                
                // Ambil data pertama kali dari Google Sheets Server Engine
                App.Connector.syncFromSpreadsheet();
            }
        };

        /* ==========================================
           MODULE: GOOGLE APPS SCRIPT CONNECTOR LAYER
           ========================================== */
        App.Connector = {
            syncFromSpreadsheet() {
                App.Utility.showMainLoader();
                
                // Cek apakah berjalan di lingkungan Web App Google Apps Script atau Browser lokal
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler((jsonResponse) => {
                            const data = JSON.parse(jsonResponse);
                            App.State.transactions = data.transactions;
                            App.State.user = data.profile;
                            
                            App.Connector.updateDOMProfile();
                            App.Router.init();
                            App.Toast.show("Sinkronisasi Sukses", "Data terbaru dari Google Sheet berhasil dimuat.", "success");
                        })
                        .withFailureHandler((err) => {
                            App.Toast.show("Koneksi Gagal", "Gagal membaca database Google Sheets: " + err.message, "danger");
                        })
                        .getAppData();
                } else {
                    // Fallback Mock Data jika file HTML dibuka di lokal desktop browser biasa
                    setTimeout(() => {
                        App.State.transactions = [
                            { id: "TX-7701", tanggal: "2026-07-16", tipe: "Pemasukan", kategori: "Project Website", pos: "BCA Wallet", jumlah: 8500000, memo: "DP Pembuatan Web Apps" },
                            { id: "TX-7702", tanggal: "2026-07-15", tipe: "Pengeluaran", kategori: "Kebutuhan Rumah", pos: "Cash", jumlah: 450000, memo: "Belanja Bulanan Swalayan" }
                        ];
                        App.State.user = { name: "Amanda Putra (Local Mock)", email: "amanda@fintrack.id" };
                        App.Connector.updateDOMProfile();
                        App.Router.init();
                        App.Toast.show("Mode Demo Lokal", "Berjalan di luar Google Script. Menggunakan memori mock data.", "success");
                    }, 800);
                }
            },

            updateDOMProfile() {
                document.getElementById('sidebarUserName').innerText = App.State.user.name;
                document.getElementById('ddMenuName').innerText = App.State.user.name;
            },

            async pushNewTransaction(tx) {
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(() => {
                            App.Connector.syncFromSpreadsheet();
                        })
                        .getAppData(); // Otomatis sync ulang pasca data masuk
                    
                    google.script.run.insertTransactionRow(JSON.stringify(tx));
                } else {
                    // Simulasi Push Lokal Browser
                    App.State.transactions.unshift(tx);
                    App.Router.renderView(App.State.activeMenu);
                }
            },

            async pushDeleteTransaction(id) {
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(() => {
                            App.Connector.syncFromSpreadsheet();
                        })
                        .deleteTransactionRow(id);
                } else {
                    // Simulasi Hapus Lokal Browser
                    App.State.transactions = App.State.transactions.filter(t => t.id !== id);
                    App.Router.renderView(App.State.activeMenu);
                }
            },

            async pushProfileUpdate(newName) {
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(() => {
                            App.Connector.syncFromSpreadsheet();
                        })
                        .updateProfileRow(newName);
                } else {
                    App.State.user.name = newName;
                    App.Connector.updateDOMProfile();
                }
            }
        };

        /* ==========================================
           MODULE: SPA CLIENT CLIENT ROUTER SYSTEM
           ========================================== */
        App.Router = {
            init() {
                if(this.initiated) {
                    this.renderView(App.State.activeMenu);
                    return;
                }
                window.addEventListener('hashchange', () => {
                    const hash = window.location.hash.replace('#/', '');
                    this.executeRoute(hash || 'dashboard');
                });
                const curHash = window.location.hash.replace('#/', '');
                this.executeRoute(curHash || 'dashboard');
                this.initiated = true;
            },
            navigate(menuId) { window.location.hash = '#/' + menuId; },
            executeRoute(menuId) {
                App.State.activeMenu = menuId;
                App.Navigation.updateActiveUI(menuId);
                this.renderView(menuId);
            },
            renderView(menuId) {
                const viewport = document.getElementById('appMainViewport');
                if(!viewport) return;
                
                let html = `
                    <nav class="breadcrumb" aria-label="Breadcrumb">
                        <a onclick="App.Router.navigate('dashboard')">FinTrack GAS</a>
                        <span class="sep">&rsaquo;</span>
                        <span style="color:var(--text-secondary)">${menuId}</span>
                    </nav>
                `;
                
                switch(menuId) {
                    case 'dashboard': html += App.Views.Dashboard(); break;
                    case 'transaksi': html += App.Views.Transaksi(); break;
                    case 'keuangan': html += App.Views.Keuangan(); break;
                    case 'profil': html += App.Views.Profil(); break;
                    default: html += `<h3>Halaman Sedang Dibuat</h3>`;
                }
                viewport.innerHTML = html;
                if(menuId === 'transaksi') App.TableModule.init();
                if(menuId === 'dashboard') App.DashboardCharts.render();
            }
        };

        /* ==========================================
           MODULE: RENDER LAYOUT HTML COMPONENT VIEWS
           ========================================== */
        App.Views = {
            Dashboard() {
                let masuk = 0, keluar = 0;
                App.State.transactions.forEach(t => {
                    if(t.tipe === 'Pemasukan') masuk += parseFloat(t.jumlah);
                    else keluar += parseFloat(t.jumlah);
                });
                return `
                    <div class="card welcome-card" style="margin-bottom:24px">
                        <div class="card-title">Cloud System Integrasi Google Sheets API</div>
                        <p>Selamat Datang kembali, sistem FinTrack mendeteksi mutasi data langsung secara real-time dari baris baris tabel cloud excel spreadsheet Anda.</p>
                        <button class="btn btn-outline" style="margin-top:12px;color:white" onclick="App.Views.triggerAddModal()">+ Catat Transaksi Baru</button>
                    </div>
                    <div class="grid-dash-stats">
                        <div class="card"><div class="card-title">Total Saldo Konsolidasi</div><div class="stat-val">Rp ${App.Utility.formatRupiah(masuk - keluar)}</div></div>
                        <div class="card"><div class="card-title">Arus Masuk Sheet</div><div class="stat-val" style="color:var(--success)">Rp ${App.Utility.formatRupiah(masuk)}</div></div>
                        <div class="card"><div class="card-title">Arus Keluar Sheet</div><div class="stat-val" style="color:var(--danger)">Rp ${App.Utility.formatRupiah(keluar)}</div></div>
                    </div>
                    <div class="card">
                        <div class="card-title">Visualisasi Alokasi Kas Buku Besar</div>
                        <div id="canvasChartMockContainer" style="height:180px; display:flex; align-items:flex-end; gap:20px; padding-top:20px"></div>
                    </div>
                `;
            },
            Transaksi() {
                return `
                    <div class="card">
                        <div class="card-title">Data Jurnal Mutasi Kerja <button class="btn btn-primary" onclick="App.Views.triggerAddModal()">+ Tambah Baris</button></div>
                        <div style="margin-bottom:12px"><input type="text" id="tableSearchInput" class="form-control" placeholder="Saring kata kunci kategori atau dompet pos..."></div>
                        <div class="table-responsive-container">
                            <table class="modern-table">
                                <thead>
                                    <tr><th>Tanggal</th><th>Tipe</th><th>Kategori</th><th>Pos Akun</th><th>Nominal</th><th>Aksi</th></tr>
                                </thead>
                                <tbody id="tableTxBodyMount"></tbody>
                            </table>
                        </div>
                        <div class="pagination-container">
                            <div id="txtTablePaginationInfo">..</div>
                            <div class="pagination-buttons"><button class="btn btn-outline" id="btnTablePrev">Prev</button><button class="btn btn-outline" id="btnTableNext">Next</button></div>
                        </div>
                    </div>
                `;
            },
            triggerAddModal() {
                App.Modal.show({
                    title: "Kirim Transaksi ke Google Sheets",
                    bodyHtml: `
                        <div class="form-group"><input type="date" id="txDate" class="form-control" required value="2026-07-16"></div>
                        <div class="form-group form-group-select-wrapper"><select id="txType" class="form-select"><option>Pengeluaran</option><option>Pemasukan</option></select></div>
                        <div class="form-group"><input type="number" id="txAmount" class="form-control" placeholder="Nominal Rupiah (Rp)" required></div>
                        <div class="form-group"><input type="text" id="txCategory" class="form-control" placeholder="Kategori Alokasi" value="Operasional"></div>
                        <div class="form-group"><input type="text" id="txWallet" class="form-control" placeholder="Pos Penyimpanan (e.g. Bank BCA)" value="BCA Wallet"></div>
                        <div class="form-group"><input type="text" id="txMemo" class="form-control" placeholder="Keterangan Catatan Singkat"></div>
                    `,
                    onConfirm: async () => {
                        const date = document.getElementById('txDate').value;
                        const type = document.getElementById('txType').value;
                        const amt = parseFloat(document.getElementById('txAmount').value);
                        const cat = document.getElementById('txCategory').value;
                        const wallet = document.getElementById('txWallet').value;
                        const memo = document.getElementById('txMemo').value;
                        
                        if(!date || !amt) {
                            App.Toast.show("Gagal Validasi", "Nominal rupiah wajib diisi.", "danger");
                            return;
                        }

                        const newTx = {
                            id: "TX-" + Math.floor(10000 + Math.random() * 90000),
                            tanggal: date, tipe: type, jumlah: amt, kategori: cat, pos: wallet, memo: memo || "-"
                        };
                        
                        App.Toast.show("Memproses Cloud", "Mengirim data baris ke infrastruktur Google Script...", "info");
                        await App.Connector.pushNewTransaction(newTx);
                    }
                });
            },
            Keuangan() {
                return `
                    <div class="card">
                        <div class="card-title">Struktur Alokasi Fisik Dompet Kas</div>
                        <p style="font-size:14px;color:var(--text-secondary)">Daftar akun tempat penampungan likuiditas operasional bisnis.</p>
                        <div style="display:flex; flex-direction:column; gap:12px; margin-top:16px">
                            <div class="card d-flex justify-between" style="padding:16px"><span>BCA Rekening Utama</span><strong style="color:var(--primary)">Aktif Terhubung</strong></div>
                            <div class="card d-flex justify-between" style="padding:16px"><span>Kas Tunai Brankas Toko</span><strong style="color:var(--primary)">Aktif Terhubung</strong></div>
                        </div>
                    </div>
                `;
            },
            Profil() {
                return `
                    <div class="card">
                        <div class="card-title">Pengaturan Sinkronisasi Profil</div>
                        <div class="form-group">
                            <input type="text" id="txtProfileNameInput" class="form-control" value="${App.State.user.name}">
                        </div>
                        <button class="btn btn-primary" onclick="App.Views.saveProfile()">Simpan Nama Profil Pengguna</button>
                    </div>
                `;
            },
            async saveProfile() {
                const name = document.getElementById('txtProfileNameInput').value;
                App.Toast.show("Menyimpan", "Mengubah sel data B2 pada sheet profiles...", "info");
                await App.Connector.pushProfileUpdate(name);
            }
        };

        /* ==========================================
           MODULE: HIGH PERFORMANCE GRID DATA TABLES
           ========================================== */
        App.TableModule = {
            init() {
                const sInput = document.getElementById('tableSearchInput');
                if(sInput) {
                    sInput.oninput = (e) => {
                        App.State.tableFilter = e.target.value.toLowerCase();
                        App.State.tablePage = 1;
                        this.render();
                    };
                }
                document.getElementById('btnTablePrev').onclick = () => { if(App.State.tablePage > 1) { App.State.tablePage--; this.render(); } };
                document.getElementById('btnTableNext').onclick = () => { App.State.tablePage++; this.render(); };
                this.render();
            },
            async deleteRow(id) {
                if(confirm("Hapus data baris transaksi ini dari Google Sheets secara permanen?")) {
                    App.Toast.show("Menghapus baris", "Memproses penghapusan data baris cloud...", "info");
                    await App.Connector.pushDeleteTransaction(id);
                }
            },
            render() {
                const tbody = document.getElementById('tableTxBodyMount');
                if(!tbody) return;
                
                let filtered = App.State.transactions.filter(t => 
                    t.kategori.toLowerCase().includes(App.State.tableFilter) || 
                    t.pos.toLowerCase().includes(App.State.tableFilter) ||
                    t.memo.toLowerCase().includes(App.State.tableFilter)
                );
                
                const start = (App.State.tablePage - 1) * App.State.tablePageSize;
                const end = start + App.State.tablePageSize;
                const pageData = filtered.slice(start, end);

                let html = '';
                pageData.forEach(t => {
                    const badge = t.tipe === 'Pemasukan' ? 'badge-success' : 'badge-danger';
                    html += `<tr>
                        <td data-label="Tanggal">${t.tanggal}</td>
                        <td data-label="Tipe"><span class="badge ${badge}">${t.tipe}</span></td>
                        <td data-label="Kategori"><strong>${t.kategori}</strong><br><small style="color:var(--text-muted)">${t.memo}</small></td>
                        <td data-label="Pos Akun">${t.pos}</td>
                        <td data-label="Nominal" style="font-weight:700">Rp ${App.Utility.formatRupiah(t.jumlah)}</td>
                        <td><button class="btn btn-outline" style="padding:4px 8px; color:var(--danger)" onclick="App.TableModule.deleteRow('${t.id}')">Hapus</button></td>
                    </tr>`;
                });
                
                tbody.innerHTML = html || '<tr><td colspan="6" style="text-align:center">Tidak ada baris transaksi ditemukan</td></tr>';
                document.getElementById('txtTablePaginationInfo').innerText = `Menampilkan ${filtered.length === 0 ? 0 : start+1}-${Math.min(end, filtered.length)} dari ${filtered.length} transaksi`;
            }
        };

        /* ==========================================
           MODULE: COMPLEMENTARY UI WIDGET HANDLERS
           ========================================== */
        App.DashboardCharts = {
            render() {
                const frame = document.getElementById('canvasChartMockContainer');
                if(!frame) return;
                let html = '';
                const maxVal = Math.max(...App.State.transactions.map(t => t.jumlah), 1000000);
                App.State.transactions.slice(0, 4).forEach(t => {
                    const pct = (t.jumlah / maxVal) * 120;
                    html += `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:8px">
                        <div style="height:${Math.max(pct, 10)}px; width:100%; max-width:35px; background:linear-gradient(to top, var(--primary), #d0bcff); border-radius:4px"></div>
                        <span style="font-size:10px; text-align:center" class="text-truncate w-100">${t.kategori}</span>
                    </div>`;
                });
                frame.innerHTML = html || '<p style="color:var(--text-muted);font-size:13px">Belum ada data grafik</p>';
            }
        };

        App.Navigation = {
            renderMenus() {
                let sbHtml = '';
                let bnavHtml = '';
                App.State.menus.forEach((m, idx) => {
                    sbHtml += `<li class="sidebar-menu-item" id="sb-${m.id}"><a onclick="App.Router.navigate('${m.id}')" class="ripple-effect"><span class="material-symbols-rounded icon-menu">${m.icon}</span><span>${m.label}</span></a></li>`;
                    if(idx < 5) {
                        bnavHtml += `<a onclick="App.Router.navigate('${m.id}')" class="bnav-item" id="bnav-${m.id}"><div class="bnav-icon-wrapper"><span class="material-symbols-rounded">${m.icon}</span></div><span>${m.label}</span></a>`;
                    }
                });
                document.getElementById('sidebarMenuContainer').innerHTML = sbHtml;
                document.getElementById('bottomNavContainer').innerHTML = bnavHtml;
            },
            updateActiveUI(menuId) {
                document.querySelectorAll('.sidebar-menu-item').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.bnav-item').forEach(el => el.classList.remove('active'));
                
                const sbEl = document.getElementById(`sb-${menuId}`);
                if(sbEl) sbEl.classList.add('active');
                
                const bnEl = document.getElementById(`bnav-${menuId}`);
                if(bnEl) bnEl.classList.add('active');
            }
        };

        App.Clock = {
            start() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('txtTimeClock').innerText = now.toTimeString().split(' ')[0] + " WIB";
                    document.getElementById('txtDayDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                }, 1000);
            }
        };

        App.Theme = {
            init() {
                document.getElementById('btnThemeToggle').onclick = () => {
                    const cur = document.documentElement.getAttribute('data-theme');
                    document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
                };
            }
        };

        App.Modal = {
            show(opt) {
                document.getElementById('modalTitle').innerText = opt.title;
                document.getElementById('modalBody').innerHTML = opt.bodyHtml;
                document.getElementById('modalBtnConfirm').onclick = () => { opt.onConfirm(); this.hide(); };
                document.getElementById('globalModalOverlay').classList.add('show');
            },
            hide() { document.getElementById('globalModalOverlay').classList.remove('show'); }
        };

        App.Toast = {
            show(title, msg, type) {
                const container = document.getElementById('toastContainer');
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                t.innerHTML = `<div class="toast-body"><strong>${title}</strong><p style="margin-top:2px;color:var(--text-secondary)">${msg}</p></div>`;
                container.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            }
        };

        App.Utility = {
            formatRupiah(n) { return new Intl.NumberFormat('id-ID').format(n); },
            showMainLoader() {
                document.getElementById('appMainViewport').innerHTML = `
                    <div style="padding:40px; text-align:center; color:var(--text-muted)">
                        <span class="material-symbols-rounded" style="font-size:48px;animation:spin 1s linear infinite">sync</span>
                        <p style="margin-top:12px; font-weight:500">Menghubungkan ke Mesin Database Google Sheets Cloud...</p>
                    </div>
                `;
            }
        };

        App.Events = {
            bindGlobal() {
                document.getElementById('sidebarToggleBtn').onclick = () => document.getElementById('appContainer').classList.toggle('sidebar-collapsed');
                document.getElementById('globalFab').onclick = () => App.Views.triggerAddModal();
                document.getElementById('modalCloseXBtn').onclick = () => App.Modal.hide();
                document.getElementById('modalBtnCancel').onclick = () => App.Modal.hide();
                
                // Tombol Sinkronisasi Manual Spreadsheet
                document.getElementById('btnRefresh').onclick = () => {
                    App.Connector.syncFromSpreadsheet();
                };
                
                // Emulasi Logout Keluar Sistem
                document.getElementById('btnLinkLogout').onclick = () => {
                    App.Toast.show("Sesi Terputus", "Aplikasi disimulasikan selesai diakses.", "warning");
                };
            }
        };

        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
